spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:account-service-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

logging:
  structured:
    format:
      console: logstash
    json:
      add:
        service: account-service

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-components: always
      show-details: always

server:
  port: 8081
