services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    environment:
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
      ACCOUNT_SERVICE_CONNECT_TIMEOUT: 500ms
      ACCOUNT_SERVICE_READ_TIMEOUT: 1s
      ACCOUNT_SERVICE_MAX_ATTEMPTS: 3
      ACCOUNT_SERVICE_INITIAL_BACKOFF: 100ms
    ports:
      - "8080:8080"
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped
